
services:
  db:
    image: postgres:15-alpine
    container_name: dev-hub-db
    environment:
      POSTGRES_USER: devuser
      POSTGRES_PASSWORD: devpassword
      POSTGRES_DB: devhub_db
    ports:
      - "5432:5432"
  redis:
    image: redis:alpine
    container_name: dev-hub-redis
    ports:
      - "6379:6379"